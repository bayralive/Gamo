name: Imperial Production Deploy
on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Decode Keystore
        run: echo "${{ secrets.RELEASE_KEYSTORE }}" | tr -d '\n ' | base64 --decode > release.jks

      - name: Build Production AAB
        run: |
          ./gradlew bundleRelease \
            -Pandroid.injected.signing.store.file=$(pwd)/release.jks \
            -Pandroid.injected.signing.store.password="${{ secrets.RELEASE_PASSWORD }}" \
            -Pandroid.injected.signing.key.alias="${{ secrets.RELEASE_ALIAS }}" \
            -Pandroid.injected.signing.key.password="${{ secrets.RELEASE_KEY_PASSWORD }}"

      - name: Upload Passenger App
        uses: actions/upload-artifact@v4
        with:
          name: Bayra-Travel-Passenger
          path: apps/customer-app/build/outputs/bundle/release/*.aab

      - name: Upload Driver App
        uses: actions/upload-artifact@v4
        with:
          name: Bayra-Travel-Guard
          path: apps/driver-app/build/outputs/bundle/release/*.aab
